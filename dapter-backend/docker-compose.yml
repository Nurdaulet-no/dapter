services:
  postgres:
    image: postgres:16-alpine
    container_name: dapter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dapter_local
    ports:
      - "5432:5432"
    volumes:
      - dapter_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dapter_local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dapter_postgres_data:
